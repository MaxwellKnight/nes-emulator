name: Deploy
# Deploy on a direct push to main (mirrors codeknight). The Docker build itself
# compiles the WASM + web, so a broken build fails here and never deploys;
# "Build and Test" runs in parallel as the full C++ test signal.
on:
  push:
    branches: [main]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/maxwellknight/nes:${{ steps.meta.outputs.tag }}
            ghcr.io/maxwellknight/nes:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    uses: MaxwellKnight/codeknight-infra/.github/workflows/deploy.yml@main
    with:
      service: nes
      tag_var: NES_TAG
      image_tag: ${{ needs.build-push.outputs.tag }}
    secrets: inherit
