name: Build and Test

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]
  workflow_dispatch:  # Allow manual triggers

# A push to a branch that also has an open PR fires both `push` and
# `pull_request`, launching two identical runs. Their WebAssembly Build jobs
# then race to create the same emsdk cache ("Unable to reserve cache with key
# ..."). Grouping by commit SHA (equal for both events) with cancel-in-progress
# collapses them into a single run, so nothing collides on the cache.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        build-type: [Release, Debug]
      fail-fast: false  # Continue with other builds if one fails

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup cache
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/pip
          /usr/local/lib/googletest
        key: ${{ runner.os }}-deps-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-deps-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential

    - name: Install GTest
      run: |
        if [ ! -d "/usr/local/lib/googletest" ]; then
          sudo apt-get install -y libgtest-dev
          cd /usr/src/googletest
          sudo cmake .
          sudo cmake --build . --target install
        fi
        # Verify installation
        ls -la /usr/local/lib/libgtest*

    - name: Configure
      run: |
        cmake -B ${{ github.workspace }}/build-${{ matrix.build-type }} \
              -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
              -DBUILD_TESTS=ON

    - name: Build
      run: |
        cmake --build ${{ github.workspace }}/build-${{ matrix.build-type }} \
              --config ${{ matrix.build-type }} \
              --parallel $(nproc)

    - name: Fetch conformance test ROMs
      run: bash tests/roms/fetch_test_roms.sh

    - name: Run tests
      working-directory: ${{ github.workspace }}/build-${{ matrix.build-type }}
      run: |
        ctest -C ${{ matrix.build-type }} --output-on-failure --verbose

    - name: Upload artifacts
      if: matrix.build-type == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.build-type }}
        path: |
          ${{ github.workspace }}/build-${{ matrix.build-type }}/**/*.a
          ${{ github.workspace }}/build-${{ matrix.build-type }}/**/*.so
          ${{ github.workspace }}/build-${{ matrix.build-type }}/**/*.wasm
        retention-days: 7

  wasm-build:
    name: WebAssembly Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v12
      with:
        version: latest
        # No actions-cache-folder: the cached path makes setup-emsdk call
        # actions/cache reserveCache, which fails repo-wide with "Unable to
        # reserve cache with key latest-linux-x64-master". Downloading emsdk
        # fresh each run (~40s) is slower but reliable.

    - name: Verify Emscripten installation
      run: |
        emcc --version

    - name: Configure WebAssembly build
      run: |
        mkdir -p wasm_build
        cd wasm_build
        emcmake cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build WebAssembly
      working-directory: wasm_build
      run: |
        make -j$(nproc)

    - name: Upload WebAssembly artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wasm-artifacts
        path: |
          wasm_build/**/*.wasm
          wasm_build/**/*.js
          wasm_build/**/*.html
        retention-days: 7

  frontend:
    name: Front-end (Vite/React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Setup Node 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
        cache-dependency-path: web/pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Typecheck
      run: pnpm typecheck

    - name: Unit & component tests
      run: pnpm test

    - name: Build
      run: pnpm build
